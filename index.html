<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
AI Street View Video Generator
</title>


<link rel="stylesheet" href="style.css">


<script src="config.js"></script>


<!-- Google Login -->
<script src="https://accounts.google.com/gsi/client" async defer></script>


</head>



<body>


<!-- 首頁 -->

<div id="page-menu">


<h1>
🚗 Street View 自動影片產生器
</h1>


<p>
輸入起點與終點，自動生成街景影片
</p>



<div id="google-login-area"></div>



<button 
class="btn btn-map"
onclick="switchPage('map')">

🗺️ 進入地圖功能

</button>


</div>






<!-- 主功能頁 -->


<div id="page-map-dashboard" class="hidden">



<!-- 左側 -->

<div class="sidebar">


<h2>
路徑設定
</h2>




<div class="input-group">

<label>
起始位置 A
</label>

<input 
id="start-input"
placeholder="例如：台北車站">


</div>




<div class="input-group">

<label>
目的地 B
</label>


<input 
id="end-input"
placeholder="例如：西門町">


</div>





<button
id="btn-generate"
class="btn-action"
onclick="generateVideo()">

🎬 產生影片

</button>




<div id="status-text">

等待輸入路線

</div>





<div class="progress-box">

<div id="progress-bar">

</div>

</div>



<div id="progress-number">

0%

</div>






<!--影片區-->

<div id="video-container"
class="hidden">


<h3>
影片預覽
</h3>


<video
id="preview-video"
controls>
</video>




<a
id="download-link"
download="streetview_trip.webm">


<button
class="btn-download">

⬇️ 下載影片

</button>


</a>


</div>





<button
class="btn-back"
onclick="switchPage('menu')">

返回首頁

</button>



</div>






<!--右側-->

<div class="map-container">


<div id="map">

</div>


<div id="pano">

</div>


</div>



</div>








<script>


/*
建立Google Login
避免 client_id undefined
*/


window.onload=function(){


google.accounts.id.initialize({

client_id:
CONFIG.GOOGLE_CLIENT_ID,


callback:
handleCredentialResponse


});



google.accounts.id.renderButton(

document.getElementById(
"google-login-area"
),

{

theme:"outline",

size:"large",

width:260


}

);


};





</script>






<script src="script.js"></script>



<script>


let googleMapScript =
document.createElement(
"script"
);



googleMapScript.src =
"https://maps.googleapis.com/maps/api/js?key="
+
CONFIG.GOOGLE_MAPS_API_KEY
+
"&libraries=geometry&callback=initMap&loading=async";



googleMapScript.async=true;

googleMapScript.defer=true;



document.head.appendChild(
googleMapScript
);



</script>




</body>

</html>
