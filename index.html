<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>
自動街景影片產生器
</title>


<link rel="stylesheet" href="style.css">


<script src="config.js"></script>


<script src="https://accounts.google.com/gsi/client" async defer></script>


</head>



<body>


<!-- =====================
首頁
===================== -->


<div id="page-menu">


<h2>
🚗 自動街景影片產生器
</h2>



<div 
id="g_id_onload"

data-client_id=""

data-callback="handleCredentialResponse">

</div>




<div 
class="g_id_signin"

data-type="standard">

</div>





<button
class="btn-map"

onclick="switchPage('map')">

進入地圖功能

</button>


</div>









<!-- =====================
主功能
===================== -->


<div 
id="page-map-dashboard"

class="hidden">






<!-- 左側 -->

<div class="sidebar">





<div class="sidebar-title">


<h2>
路徑設定
</h2>


<button
class="api-button"

onclick="openApiModal()">

📊 API估算

</button>


</div>









<!-- 起點 -->

<div class="location-box">


<label>
起始點 A
</label>


<div class="location-row">


<input

id="start-input"

value="台北車站"

>


<button

class="location-btn"

onclick="locateStart()">

定位

</button>


</div>


</div>








<!-- 終點 -->


<div class="location-box">


<label>
目的地 B
</label>



<div class="location-row">


<input

id="end-input"

value="西門紅樓"

>


<button

class="location-btn"

onclick="locateEnd()">

定位

</button>


</div>



</div>









<button

class="btn-action"

onclick="generateVideo()">

🎬 產生影片

</button>









<!-- 狀態 -->


<div class="status-card">


<div class="status-title">

生成狀態

</div>



<div id="status-text">

等待輸入

</div>



<div class="estimate-time">


預估影片時間：

<span id="estimated-time">

尚未計算

</span>


</div>



</div>









<!-- 進度 -->


<div class="progress-container">


<div class="progress-title">


<span>

生成進度

</span>



<span id="progress-number">

0%

</span>


</div>



<div class="progress-bg">


<div id="progress-bar">

</div>


</div>


</div>









<!-- 影片 -->


<div 
id="video-container"

class="hidden">


<div class="video-title">

🎥 Street View影片

</div>




<video

id="preview-video"

controls

playsinline>

</video>





<a

id="download-link"

download="streetview.webm">


<button

class="btn-download">

⬇️ 下載影片

</button>


</a>



</div>









<button

class="btn-back"

onclick="switchPage('menu')">

返回首頁

</button>




</div>









<!-- =====================
右側 Map / StreetView
===================== -->


<div class="map-container">


<div id="map"></div>


<div id="pano"></div>


</div>







</div>









<!-- =====================
API Modal
===================== -->


<div

id="api-modal"

class="modal hidden">



<div class="modal-box">



<button

class="modal-close"

onclick="closeApiModal()">

×

</button>




<h3>

📊 API 使用估算

</h3>





<div id="api-estimate">


尚未產生影片

</div>







<button

class="modal-confirm"

onclick="closeApiModal()">

關閉

</button>



</div>



</div>









<script src="script.js"></script>






<script>


window.onload=function(){



document

.getElementById("g_id_onload")

.dataset.client_id =

CONFIG.GOOGLE_CLIENT_ID;





let script=document.createElement("script");



script.src=

"https://maps.googleapis.com/maps/api/js?key="

+

CONFIG.GOOGLE_MAPS_API_KEY

+

"&libraries=geometry&callback=initMap&loading=async";





script.async=true;

script.defer=true;



document.head.appendChild(script);



}


</script>





</body>

</html>
