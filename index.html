<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
Street View Video Generator
</title>


<link rel="stylesheet" href="style.css">


<script src="config.js"></script>

<script src="https://accounts.google.com/gsi/client" async defer></script>


</head>


<body>



<div id="page-menu">


<h1>
🚗 Street View AI Video
</h1>


<p>
自動生成 A 到 B 街景動畫
</p>



<div id="google-login-area"></div>




<button
class="btn-map"
onclick="switchPage('map')">

🗺️ 進入地圖功能

</button>



</div>








<div id="page-map-dashboard"
class="hidden">





<div class="sidebar">



<h2>
路徑設定
</h2>





<div class="location-row">


<div class="input-group">

<label>
📍 起始位置
</label>


<input
id="start-input"
placeholder="例如：台北車站">

</div>


<button
class="location-btn"
onclick="locateStart()">

定位

</button>



</div>







<div class="location-row">


<div class="input-group">


<label>
🏁 目的地
</label>


<input
id="end-input"
placeholder="例如：西門紅樓">


</div>



<button
class="location-btn"
onclick="locateEnd()">

定位

</button>


</div>







<div class="mode-box">


<h3>
🎬 影片模式
</h3>


<p>
✓ Street View 沿路動畫模式
</p>


<p>
✓ 每約20~30公尺取樣
</p>


<p>
✓ 每個畫面停留1.5秒
</p>


</div>







<button
id="btn-generate"
class="btn-action"
onclick="generateVideo()">


🎥 開始產生影片


</button>








<div id="status-text">

等待輸入

</div>





<div class="progress-box">


<div id="progress-bar"></div>


</div>



<div id="progress-number">

0%

</div>






<div class="api-box">


<h3>
📊 API 使用估算
</h3>



<div id="api-estimate">

尚未產生

</div>


</div>








<div id="video-container"
class="hidden">


<h3>
🎥 完成影片
</h3>


<video
id="preview-video"
controls>

</video>


</div>








<button
class="btn-back"
onclick="switchPage('menu')">

返回首頁

</button>



</div>









<div class="map-container">


<div id="map"></div>


<div id="pano"></div>


</div>




</div>






<script>


window.onload=function(){


google.accounts.id.initialize({

client_id:
CONFIG.GOOGLE_CLIENT_ID,


callback:
handleCredentialResponse

});



google.accounts.id.renderButton(

document.getElementById(
"google-login-area"
),

{

theme:"outline",

size:"large",

width:260

}

);



};



</script>






<script src="script.js"></script>



<script>


let s=document.createElement("script");


s.src=

"https://maps.googleapis.com/maps/api/js?key="
+
CONFIG.GOOGLE_MAPS_API_KEY
+
"&libraries=geometry,places&callback=initMap&loading=async";



s.async=true;

s.defer=true;


document.head.appendChild(s);



</script>




</body>

</html>
