<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>自動街景影片產生器</title>


<link rel="stylesheet" href="style.css">


<script src="config.js"></script>


<!-- Google Login -->
<script src="https://accounts.google.com/gsi/client" async defer></script>


<!-- GIF library -->
<script src="https://cdn.jsdelivr.net/npm/gifshot@0.4.5/dist/gifshot.min.js"></script>


</head>


<body>


<!-- 第一頁 -->

<div id="page-menu">


<h2>
自動街景影片產生器
</h2>



<div 
id="g_id_onload"
data-client_id=""
data-callback="handleCredentialResponse">
</div>


<div 
class="g_id_signin"
data-type="standard">
</div>



<button 
class="btn btn-map"
onclick="switchPage('map')">

進入地圖功能

</button>



</div>






<!-- 第二頁 -->


<div id="page-map-dashboard" class="hidden">


<div class="sidebar">


<h2>
路徑設定
</h2>



<div class="input-group">

<label>
起點
</label>

<input 
id="start-input"
value="台北車站">

</div>



<div class="input-group">

<label>
終點
</label>


<input 
id="end-input"
value="西門紅樓">

</div>



<button
id="btn-generate"
class="btn-action"
onclick="generateStreetViewVideo()">

產生影片

</button>



<div id="status-text">

等待開始

</div>



<div class="progress-box">

<div id="progress-bar"></div>

</div>


<div id="progress-number">
0%
</div>




<div 
id="preview-container"
class="hidden">


<h3>
影片預覽
</h3>


<img 
id="preview-gif">



<a 
id="download-link"
download="streetview.gif">


<button 
class="btn-action btn-download">

下載影片

</button>


</a>



</div>




<button
class="btn-action back"
onclick="switchPage('menu')">

返回

</button>


</div>






<div class="map-container">


<div id="map"></div>


<div id="pano"></div>


</div>



</div>






<script src="script.js"></script>



<script>


let script=document.createElement("script");


script.src=
"https://maps.googleapis.com/maps/api/js?key="
+
CONFIG.GOOGLE_MAPS_API_KEY
+
"&libraries=geometry&callback=initMap&loading=async";


script.async=true;

script.defer=true;


document.head.appendChild(script);



</script>



</body>

</html>
