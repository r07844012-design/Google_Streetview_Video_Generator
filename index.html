<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>
自動街景影片產生器
</title>


<link rel="stylesheet" href="style.css">


<script src="config.js"></script>


<script src="https://accounts.google.com/gsi/client" async defer></script>


</head>



<body>


<!-- =====================
首頁
===================== -->


<div id="page-menu">


<h2>
🚗 自動街景影片產生器
</h2>



<button class="btn-account" onclick="switchPage('account')">

⚙️ 帳戶設定

</button>





<button
class="btn-map"

onclick="switchPage('map')">

進入地圖功能

</button>


</div>









<!-- 帳戶設定 -->

<div id="page-account" class="hidden">

<div class="account-card">

<div class="account-header">
<button class="back-icon" onclick="switchPage('menu')" aria-label="回上一頁" title="回上一頁">←</button>
<h2>帳戶設定</h2>
</div>

<p class="account-intro">選擇要用哪一組 Google 設定來使用地圖功能。</p>

<div class="account-options" role="radiogroup" aria-label="帳戶設定">
<label class="account-option">
<input type="radio" name="config-profile" value="creator" checked onchange="selectConfigProfile('creator')">
<span><strong>使用創作者帳戶</strong><small>直接使用本網站提供的地圖功能</small></span>
</label>

<label class="account-option">
<input type="radio" name="config-profile" value="custom" onchange="selectConfigProfile('custom')">
<span><strong>使用自己的 Google 帳戶</strong><small>使用自己的 Client ID 與 Maps API Key</small></span>
</label>
</div>

<div id="custom-config-fields" class="custom-config hidden">
<label for="custom-client-id">Google Client ID</label>
<input id="custom-client-id" type="text" autocomplete="off" placeholder="xxxx.apps.googleusercontent.com">

<label for="custom-maps-api-key">Google Maps API Key</label>
<input id="custom-maps-api-key" type="text" autocomplete="off" placeholder="AIza...">

<button class="btn-save-config" onclick="saveCustomConfig()">儲存並使用此設定</button>

<small class="config-help">Google 登入僅用於辨識帳戶，不會提供或自動讀取你的 Client ID、Maps API Key。</small>

<div id="google-signin-button"></div>
</div>

<button class="btn-map" onclick="switchPage('map')">進入地圖功能</button>

</div>

</div>


<!-- =====================
主功能
===================== -->


<div 
id="page-map-dashboard"

class="hidden">






<!-- 左側 -->

<div class="sidebar">





<div class="sidebar-title">


<div class="sidebar-heading">

<button
class="back-icon"
onclick="switchPage('menu')"
aria-label="回上一頁"
title="回上一頁">

←

</button>

<h2>
路徑設定
</h2>

</div>


<button
class="api-button"

onclick="openApiModal()">

📊 API估算

</button>


</div>









<!-- 起點 -->

<div class="location-box">


<label>
起始點 A
</label>


<div class="location-row">


<input

id="start-input"

value="台北車站"

>


<button

class="location-btn"

onclick="locateStart()">

定位

</button>


</div>


</div>








<!-- 終點 -->


<div class="location-box">


<label>
目的地 B
</label>



<div class="location-row">


<input

id="end-input"

value="西門紅樓"

>


<button

class="location-btn"

onclick="locateEnd()">

定位

</button>


</div>



</div>









<button
    id="btn-generate"
    class="btn-action"
    onclick="generateVideo()">

🎬 產生影片

</button>


<div class="generation-settings">

<span class="settings-label">交通工具</span>

<div class="transport-options" role="radiogroup" aria-label="交通工具">

<label class="transport-option">
<input type="radio" name="transport-mode" value="car" checked>
<span>🚗 汽車</span>
</label>

<label class="transport-option">
<input type="radio" name="transport-mode" value="motorcycle">
<span>🛵 機車</span>
</label>

<label class="transport-option">
<input type="radio" name="transport-mode" value="walking">
<span>🚶 步行</span>
</label>

</div>

<label for="frame-distance">每幾公尺一張</label>

<div class="frame-distance-control">
<input id="frame-distance" type="number" min="10" step="10" value="50">
<span>公尺</span>
</div>

</div>









<!-- 狀態 -->

<div class="status-card">

    <span class="status-title">
        生成狀態
    </span>

    <span id="status-text">
        尚未開始
    </span>

    <span
        class="estimate-time"
        id="estimate-time"
    >
        --
    </span>

</div>








<!-- 進度 -->


<div class="progress-container">


<div class="progress-title">


<span>

生成進度

</span>



<span id="progress-number">

0%

</span>


</div>



<div class="progress-bg">


<div id="progress-bar">

</div>


</div>


</div>









<!-- 影片 -->


<div 
id="video-container"

class="hidden">


<div class="video-title">

<span>🎥 Street View影片</span>

<a

id="download-link"

class="download-button"

download="streetview.webm"

aria-label="下載影片"

title="下載影片">

<span aria-hidden="true">↓</span>

<span>下載影片</span>

</a>

</div>




<video

id="preview-video"

controls

playsinline>

</video>



</div>









</div>









<!-- =====================
右側 Map / StreetView
===================== -->


<div class="map-container">


<div id="map"></div>


<div id="pano"></div>


</div>







</div>









<!-- =====================
API Modal
===================== -->


<div

id="api-modal"

class="modal hidden">



<div class="modal-box">



<button

class="modal-close"

onclick="closeApiModal()">

×

</button>




<h3>

📊 API 使用估算

</h3>





<div id="api-estimate">


尚未產生影片

</div>







<button

class="modal-confirm"

onclick="closeApiModal()">

關閉

</button>



</div>



</div>









<script src="script.js"></script>






<script>


window.onload=function(){

initializeAccountSettings();

return;



google.accounts.id.initialize({

client_id:CONFIG.GOOGLE_CLIENT_ID,

callback:handleCredentialResponse

});



google.accounts.id.renderButton(

document.getElementById("google-signin-button"),

{

type:"standard",

theme:"outline",

size:"large",

text:"signin_with",

locale:"zh-TW",

width:260

}

);





let script=document.createElement("script");



script.src=

"https://maps.googleapis.com/maps/api/js?key="

+

CONFIG.GOOGLE_MAPS_API_KEY

+

"&libraries=geometry&callback=initMap&loading=async";





script.async=true;

script.defer=true;



document.head.appendChild(script);



}


</script>





</body>

</html>
